# Vercel / GitHub Actions に登録する環境変数の定義。
#
# 値はこのファイルには書かない（git にコミットされるため）。値は .env(.production) から取得する。
# ここに宣言が無いキーは登録されない（.env にあっても警告のうえスキップされる）。
#
#   secret: true|false
#           - true  : シークレットとして登録
#                     Vercel: sensitive（保存後は値を読めない）
#                     GitHub: Actions Secret（sealed box 暗号化）
#           - false : 平文として登録
#                     Vercel: plain
#                     GitHub: Actions Variable
#           ※ 未指定時のデフォルトは true（安全側）
#
#   environments: []  登録先環境の配列
#           Vercel: production|preview|development（空なら production と preview）
#           GitHub: named environment 名（空なら repo レベル）
#           ※ GitHub の named environment は事前に作成が必要

defaults:
  secret: true

variables:
  # ---- 例 ----
  # NEXT_PUBLIC_API_BASE_URL: { secret: false }
  # DATABASE_URL:             { secret: true }
  # STAGING_KEY:              { secret: true, environments: [production] }
